<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hebrew Letter Placards — Enter Cast Names</title>
<style>

/* ══════════════════════════════════════
   SCREEN — form only
══════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #f4f0e8;
  color: #1a0f2e;
  padding: 0.4in 0.5in;
}

h1 {
  font-size: 22pt;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 10pt;
  color: #666;
  margin-bottom: 0.25in;
  font-style: italic;
}

.print-btn {
  display: inline-block;
  margin-bottom: 0.25in;
  padding: 10px 28px;
  background: #1a0f2e;
  color: #fff;
  font-family: Georgia, serif;
  font-size: 11pt;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.print-btn:hover { background: #2e1a55; }

table {
  border-collapse: collapse;
  width: 100%;
  max-width: 680px;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

thead th {
  background: #1a0f2e;
  color: #e8c96a;
  font-size: 8pt;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 14px;
  text-align: left;
}

tbody tr:nth-child(even) { background: #faf7f0; }

td {
  padding: 6px 14px;
  vertical-align: middle;
}

.td-heb {
  font-size: 28pt;
  font-family: 'Times New Roman', serif;
  font-weight: bold;
  direction: rtl;
  width: 0.65in;
  text-align: center;
  color: #8b6010;
}

.td-en {
  font-size: 12pt;
  font-weight: bold;
  width: 1.1in;
}

.td-input input {
  width: 100%;
  font-family: Georgia, serif;
  font-size: 11pt;
  padding: 5px 8px;
  border: 1px solid #c9a84c;
  border-radius: 3px;
  background: #fffef8;
  color: #1a0f2e;
}
.td-input input:focus {
  outline: none;
  border-color: #8b6010;
  background: #fff;
}

@media screen {
  .print-section { display: none; }
}

/* ══════════════════════════════════════
   PRINT — cards only
══════════════════════════════════════ */
@media print {
  @page { size: 11in 8.5in; margin: 0; }

  body { background: none; padding: 0; }
  .form-section { display: none; }
  .print-section { display: block; }

  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .sheet {
    width: 11in;
    height: 8.5in;
    background: #fff;
    display: flex;
    flex-direction: row;
    position: relative;
    overflow: hidden;
    page-break-after: always;
    break-after: page;
  }
  .sheet:last-child { page-break-after: avoid; break-after: avoid; }

  .center-line {
    position: absolute;
    left: 50%;
    top: 0.25in;
    bottom: 0.25in;
    width: 0;
    border-left: 1px solid #000;
    z-index: 10;
  }

  .panel {
    width: 5.5in;
    height: 8.5in;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.15in;
  }

  .circle-frame {
    width: 4.8in;
    height: 4.8in;
    border: 12px solid #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .heb-letter {
    font-family: 'Times New Roman', serif;
    font-weight: bold;
    line-height: 1;
    direction: rtl;
    display: block;
  }

  .letter-name {
    font-size: 20pt;
    font-weight: bold;
    letter-spacing: 0.06em;
    text-align: center;
  }

  .cast-name {
    font-size: 15pt;
    font-style: italic;
    color: #444;
    text-align: center;
    min-height: 0.28in;
  }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     FORM SECTION (screen only)
══════════════════════════════════════ -->
<div class="form-section">
  <h1>Hebrew Letter Placards</h1>
  <p class="subtitle">Enter or edit each cast member's name, then click Print Cards.</p>
  <button class="print-btn" onclick="syncAndPrint()">Print Cards</button>

  <table>
    <thead>
      <tr>
        <th>Letter</th>
        <th>Name</th>
        <th>Cast Member</th>
      </tr>
    </thead>
    <tbody id="form-body"></tbody>
  </table>
</div>

<!-- ══════════════════════════════════════
     PRINT SECTION (print only)
══════════════════════════════════════ -->
<div class="print-section" id="print-section"></div>

<script>
const letters = [
  { en:"Alef",   heb:"א", cast:"Akiva Levin",                    style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Bet",    heb:"ב", cast:"Arya Nutting",                   style:"font-size:4.3in; margin-top:0.17in;" },
  { en:"Gimel",  heb:"ג", cast:"Margot Weiner",                  style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Dalet",  heb:"ד", cast:"Dylan Hanson",                   style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Heh",    heb:"ה", cast:"Zoe Olbrot",                     style:"font-size:4.4in; margin-top:0.1in;" },
  { en:"Vav",    heb:"ו", cast:"Mayim Olbrot",                   style:"font-size:4.5in; transform:scaleX(1); margin-top:0.07in;" },
  { en:"Zayin",  heb:"ז", cast:"Joey Schook",                    style:"font-size:4.5in; transform:scaleX(1); margin-top:0.07in;" },
  { en:"Chet",   heb:"ח", cast:"Gabriel Weston",                 style:"font-size:4.3in; margin-top:0.1in;" },
  { en:"Tet",    heb:"ט", cast:"Juliana Levin",                  style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Yod",    heb:"י", cast:"Gabriel Leverdink",              style:"font-size:2.7in; transform:scaleX(2) scaleY(2); margin-top:0.13in;" },
  { en:"Kaf",    heb:"כ", cast:"Kase Nutting & Micah Lando",     style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Lamed",  heb:"ל", cast:"Davi Lando",                     style:"font-size:4.0in; margin-top:-0.07in;" },
  { en:"Mem",    heb:"מ", cast:"Stella Wood & Vivienne Lando",   style:"font-size:4.1in; margin-top:0.17in;" },
  { en:"Nun",    heb:"נ", cast:"Alana Weston",                   style:"font-size:4.8in; margin-top:0.14in;" },
  { en:"Samech", heb:"ס", cast:"Eli Shapiro & Charlotte Campbell",style:"font-size:4.1in; margin-top:0.14in;" },
  { en:"Ayin",   heb:"ע", cast:"Amelia Schook",                  style:"font-size:4.2in; margin-top:0.17in;" },
  { en:"Peh",    heb:"פ", cast:"Robert Clarey",                  style:"font-size:4.3in; margin-top:0.14in;" },
  { en:"Tzadi",  heb:"צ", cast:"Zack Wood",                      style:"font-size:4.1in; margin-top:0.07in;" },
  { en:"Kuf",    heb:"ק", cast:"Viola Fisher",                   style:"font-size:4.1in; margin-top:-0.1in;" },
  { en:"Resh",   heb:"ר", cast:"Ada Wood & Davida Birnbaum",     style:"font-size:4.3in; margin-top:0.1in;" },
  { en:"Shin",   heb:"ש", cast:"Harlon Campbell",                style:"font-size:3.9in; margin-top:0.21in;" },
  { en:"Tav",    heb:"ת", cast:"Sami Horvitz",                   style:"font-size:4.1in; margin-top:0.14in;" },
];

// Build form rows
const tbody = document.getElementById('form-body');
letters.forEach((l, i) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="td-heb">${l.heb}</td>
    <td class="td-en">${l.en}</td>
    <td class="td-input"><input type="text" id="cast-${i}" value="${l.cast}" placeholder="Cast member name"></td>`;
  tbody.appendChild(tr);
});

// Build print layout from current input values
function buildPrintLayout() {
  const section = document.getElementById('print-section');
  section.innerHTML = '';

  for (let i = 0; i < letters.length; i += 2) {
    const sheet = document.createElement('div');
    sheet.className = 'sheet';
    sheet.innerHTML = '<div class="center-line"></div>';

    [letters[i], letters[i + 1]].forEach((l, j) => {
      if (!l) return;
      const castVal = document.getElementById(`cast-${i + j}`)?.value || '';
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = `
        <div class="circle-frame">
          <span class="heb-letter" style="${l.style}">${l.heb}</span>
        </div>
        <div class="letter-name">${l.en}</div>
        <div class="cast-name">${castVal}</div>`;
      sheet.appendChild(panel);
    });

    section.appendChild(sheet);
  }
}

function syncAndPrint() {
  buildPrintLayout();
  window.print();
}
</script>
</body>
</html>
