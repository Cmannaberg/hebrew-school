<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Letters Ask to Begin the World — Poster</title>
<style>
/*
  POSTER — 18 × 24 inches  (standard theatrical poster)
  ──────────────────────────────────────────────────────
  artwork.png is referenced as a relative path below.
  Supply artwork.png separately to your printer/designer.
  To resize: change the two @page and .poster dimensions together.
*/

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #555;
}

.poster {
  width: 18in;
  height: 24in;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #1a0f2e;
}

/* ── ART AREA — top 58% ── */
.art-area {
  flex: 0 0 13.92in;
  position: relative;
  overflow: hidden;
  background: #1a5f7a;
}

.art-area img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  display: block;
}

.art-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.25in;
  color: rgba(255,255,255,0.35);
  font-size: 22pt;
  font-style: italic;
  text-align: center;
}
.art-placeholder .ph-heb {
  font-size: 64pt;
  direction: rtl;
  letter-spacing: 0.15em;
  color: rgba(201,146,42,0.25);
}

/* ── TEXT AREA — bottom 42% ── */
.text-area {
  flex: 1;
  background: #1a0f2e;
  border-top: 8px solid #c9922a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0.45in 1in 0.5in;
  gap: 0.18in;
}

.heb-title {
  font-size: 38pt;
  color: #c9922a;
  direction: rtl;
  letter-spacing: 0.1em;
  line-height: 1.25;
}

.eng-title {
  font-size: 68pt;
  font-weight: bold;
  color: #f5ead8;
  line-height: 1.08;
  letter-spacing: 0.01em;
}

.subtitle {
  font-size: 22pt;
  font-style: italic;
  color: #c9922a;
  letter-spacing: 0.1em;
}

.divider {
  width: 5in;
  border: none;
  border-top: 1.5px solid rgba(201,146,42,0.45);
  margin: 0.05in 0;
}

.school {
  font-size: 19pt;
  color: #f5ead8;
  letter-spacing: 0.06em;
}

.date {
  font-size: 17pt;
  color: rgba(245,234,216,0.65);
  font-style: italic;
  letter-spacing: 0.05em;
}

@media print {
  @page { size: 18in 24in; margin: 0; }
  body  { background: none; }
}
</style>
</head>
<body>

<div class="poster">

  <!-- ── ARTWORK ─────────────────────────────────────────
       Supply artwork.png to your printer separately.
       When the file is in the same folder, it previews here.
  ──────────────────────────────────────────────────────── -->
  <div class="art-area">
    <img src="artwork.png" alt="Artwork — The Letters Ask to Begin the World"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="art-placeholder" style="display:none;">
      <div class="ph-heb">א ב ג ד ה</div>
      <div>artwork.png</div>
      <div class="ph-heb">כ ל מ נ ס</div>
    </div>
  </div>

  <!-- ── TEXT ────────────────────────────────────────── -->
  <div class="text-area">
    <div class="heb-title">הָאוֹתִיּוֹת מְבַקְּשׁוֹת לִבְרֹא אֶת הָעוֹלָם</div>
    <div class="eng-title">The Letters Ask to<br>Begin the World</div>
    <div class="subtitle">A Living Midrash for Graduation Day</div>
    <hr class="divider">
    <div class="school">Okun Kalamazoo Combined Jewish School</div>
    <div class="date">End of School Celebration &nbsp;·&nbsp; May 17, 2026</div>
  </div>

</div>

</body>
</html>
