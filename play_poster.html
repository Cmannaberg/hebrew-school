<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Letters Ask to Begin the World — Poster</title>
<style>
/*
  POSTER — 24 × 36 inches
  ──────────────────────────────────────────────────────
  artwork.png is the background image (supply separately to printer).
  Text is overlaid at the bottom with a gradient for readability.
*/

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #333;
}

.poster {
  width: 24in;
  height: 36in;
  position: relative;
  overflow: hidden;
  background: #1a0f2e;
}

/* ── BACKGROUND IMAGE ── */
.bg-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.bg-placeholder {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3in;
  color: rgba(255,255,255,0.25);
  font-size: 28pt;
  font-style: italic;
  text-align: center;
  background: #1a5f7a;
}
.bg-placeholder .ph-heb {
  font-size: 80pt;
  direction: rtl;
  letter-spacing: 0.15em;
  color: rgba(201,146,42,0.2);
}

/* ── GRADIENT OVERLAY — bottom third ── */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 40%,
    rgba(26, 15, 46, 0.55) 60%,
    rgba(26, 15, 46, 0.88) 75%,
    rgba(26, 15, 46, 0.97) 100%
  );
}

/* ── TEXT — pinned to bottom ── */
.text-area {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0.6in 1.2in 0.8in;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 0.2in;
}

.heb-title {
  font-size: 44pt;
  color: #c9922a;
  direction: rtl;
  letter-spacing: 0.1em;
  line-height: 1.25;
}

.eng-title {
  font-size: 88pt;
  font-weight: bold;
  color: #f5ead8;
  line-height: 1.05;
  letter-spacing: 0.01em;
}

.subtitle {
  font-size: 28pt;
  font-style: italic;
  color: #c9922a;
  letter-spacing: 0.1em;
}

.divider {
  width: 6in;
  border: none;
  border-top: 1.5px solid rgba(201,146,42,0.5);
  margin: 0.05in 0;
}

.school {
  font-size: 24pt;
  color: #f5ead8;
  letter-spacing: 0.06em;
}

.date {
  font-size: 20pt;
  color: rgba(245,234,216,0.7);
  font-style: italic;
  letter-spacing: 0.05em;
}

@media print {
  @page { size: 24in 36in; margin: 0; }
  body  { background: none; }
}
</style>
</head>
<body>

<div class="poster">

  <!-- BACKGROUND IMAGE — supply artwork.png separately to printer -->
  <img class="bg-img" src="artwork.png" alt="Artwork — The Letters Ask to Begin the World"
       onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
  <div class="bg-placeholder">
    <div class="ph-heb">א ב ג ד ה</div>
    <div>artwork.png</div>
    <div class="ph-heb">כ ל מ נ ס</div>
  </div>

  <!-- GRADIENT OVERLAY -->
  <div class="overlay"></div>

  <!-- TEXT ON TOP -->
  <div class="text-area">
    <div class="heb-title">הָאוֹתִיּוֹת מְבַקְּשׁוֹת לִבְרֹא אֶת הָעוֹלָם</div>
    <div class="eng-title">The Letters Ask to<br>Begin the World</div>
    <div class="subtitle">A Living Midrash for Graduation Day</div>
    <hr class="divider">
    <div class="school">Okun Kalamazoo Community Jewish School</div>
    <div class="date">End of School Celebration &nbsp;·&nbsp; May 17, 2026</div>
  </div>

</div>

</body>
</html>
